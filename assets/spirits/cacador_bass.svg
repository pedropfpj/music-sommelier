<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="t d">
  <title id="t">Cacador de Bass</title>
  <desc id="d">Avatar de espirito musical com subwoofer pulsante.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f25"/>
      <stop offset="100%" stop-color="#2f2141"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#72efff"/>
      <stop offset="100%" stop-color="#ff77ba"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#ff7ebb" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff7ebb" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="76" fill="url(#bg)"/>
  <rect x="70" y="70" width="884" height="884" rx="54" fill="none" stroke="url(#frame)" stroke-width="8"/>
  <rect x="104" y="104" width="816" height="816" rx="42" fill="none" stroke="#ff9fcd" stroke-opacity="0.26" stroke-width="2" stroke-dasharray="18 12"/>
  <circle cx="512" cy="492" r="280" fill="url(#halo)"/>
  <circle cx="512" cy="492" r="214" fill="#17112b" stroke="#ff84c2" stroke-opacity="0.9" stroke-width="6"/>

  <rect x="352" y="352" width="320" height="320" rx="38" fill="#23163a" stroke="#7defff" stroke-width="5"/>
  <circle cx="512" cy="512" r="126" fill="#0f152e" stroke="#ff9fd1" stroke-width="6"/>
  <circle cx="512" cy="512" r="82" fill="#1d2548" stroke="#8cf4ff" stroke-width="5">
    <animate attributeName="r" values="70;92;74;88;70" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="512" cy="512" r="24" fill="#ffd6ee"/>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#ff8dc7" stroke-opacity="0.45" stroke-width="4">
    <animate attributeName="r" values="132;168;132" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.65;0.15;0.65" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <text x="512" y="745" fill="#ffe2f3" font-family="Arial, sans-serif" font-size="96" font-weight="800" text-anchor="middle">CB</text>
</svg>
