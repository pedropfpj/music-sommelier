<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Sonic Search logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050b1d"/>
      <stop offset="58%" stop-color="#091735"/>
      <stop offset="100%" stop-color="#15234a"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.2" cy="0.18" r="0.62">
      <stop offset="0%" stop-color="#48ffd8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#48ffd8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.86" cy="0.82" r="0.64">
      <stop offset="0%" stop-color="#9e6bff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#9e6bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7bffe5"/>
      <stop offset="48%" stop-color="#65c9ff"/>
      <stop offset="100%" stop-color="#9b80ff"/>
    </linearGradient>
    <radialGradient id="core" cx="0.34" cy="0.28" r="0.72">
      <stop offset="0%" stop-color="#89ffe9"/>
      <stop offset="46%" stop-color="#52cbff"/>
      <stop offset="100%" stop-color="#111a3d"/>
    </radialGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9fffe5"/>
      <stop offset="58%" stop-color="#67c2ff"/>
      <stop offset="100%" stop-color="#7f84ff"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-30%" width="150%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clipCard">
      <rect x="10" y="10" width="1180" height="300" rx="40"/>
    </clipPath>
  </defs>

  <rect width="1200" height="320" rx="42" fill="url(#bg)"/>
  <g clip-path="url(#clipCard)">
    <rect width="1200" height="320" fill="url(#glowA)"/>
    <rect width="1200" height="320" fill="url(#glowB)"/>
    <path d="M0 238 C190 188, 360 286, 555 234 C744 184, 928 272, 1200 214" fill="none" stroke="#79b9ff" stroke-opacity="0.17" stroke-width="3"/>
    <path d="M0 254 C176 214, 356 300, 550 248 C756 194, 955 284, 1200 238" fill="none" stroke="#8fe7d7" stroke-opacity="0.12" stroke-width="2"/>
    <g stroke="#9dd2ff" stroke-opacity="0.18">
      <line x1="306" y1="55" x2="306" y2="266"/>
      <line x1="352" y1="55" x2="352" y2="266"/>
      <line x1="398" y1="55" x2="398" y2="266"/>
    </g>
  </g>

  <rect x="10" y="10" width="1180" height="300" rx="40" fill="none" stroke="#66c4ff" stroke-opacity="0.35"/>

  <g transform="translate(156 160)">
    <circle r="102" fill="none" stroke="url(#ring)" stroke-width="4" filter="url(#softGlow)"/>
    <circle r="84" fill="#0a1634" stroke="#6bdcff" stroke-opacity="0.35" stroke-width="2"/>
    <circle r="68" fill="url(#core)" filter="url(#softGlow)"/>
    <text x="0" y="21" text-anchor="middle" fill="#041425" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="70" font-weight="900" letter-spacing="2">SS</text>
    <g transform="translate(-43 54)">
      <rect x="0" y="18" width="12" height="20" rx="6" fill="url(#bar)"/>
      <rect x="18" y="9" width="12" height="29" rx="6" fill="url(#bar)"/>
      <rect x="36" y="0" width="12" height="38" rx="6" fill="url(#bar)"/>
      <rect x="54" y="10" width="12" height="28" rx="6" fill="url(#bar)"/>
      <rect x="72" y="4" width="12" height="34" rx="6" fill="url(#bar)"/>
    </g>
  </g>

  <g transform="translate(300 108)">
    <text x="0" y="56" fill="#ecf9ff" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="86" font-weight="900" letter-spacing="1" filter="url(#textGlow)">SONIC SEARCH</text>
    <text x="2" y="114" fill="#a9d5ff" font-family="system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="1.2">ELECTRONIC DISCOVERY ENGINE</text>
  </g>
</svg>
