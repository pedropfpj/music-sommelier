<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Sonic Search tab icon</title>
  <desc id="desc">Compact Sonic Search monogram for browser tabs.</desc>
  <defs>
    <linearGradient id="bg" x1="74" y1="38" x2="446" y2="486" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050914"/>
      <stop offset="0.52" stop-color="#081d38"/>
      <stop offset="1" stop-color="#031018"/>
    </linearGradient>
    <linearGradient id="mark" x1="112" y1="120" x2="410" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8efff0"/>
      <stop offset="0.42" stop-color="#4fd2ff"/>
      <stop offset="0.75" stop-color="#2c6fb4"/>
      <stop offset="1" stop-color="#d3a7ff"/>
    </linearGradient>
    <linearGradient id="lens" x1="113" y1="288" x2="224" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dfff0"/>
      <stop offset="1" stop-color="#36c4ff"/>
    </linearGradient>
    <filter id="glow" x="-28%" y="-28%" width="156%" height="156%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.23 0 0 0 0 0.91 0 0 0 0 1 0 0 0 0.58 0" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000814" flood-opacity="0.58" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect x="22" y="22" width="468" height="468" rx="96" fill="none" stroke="#74fff0" stroke-opacity="0.32" stroke-width="10" />
  <circle cx="262" cy="250" r="164" fill="#36dfff" opacity="0.1" />
  <circle cx="330" cy="143" r="86" fill="#9b7dff" opacity="0.13" />
  <g opacity="0.24">
    <rect x="130" y="296" width="22" height="70" rx="11" fill="#95fff4" />
    <rect x="168" y="254" width="22" height="112" rx="11" fill="#95fff4" />
    <rect x="206" y="214" width="22" height="152" rx="11" fill="#95fff4" />
    <rect x="244" y="172" width="22" height="194" rx="11" fill="#95fff4" />
    <rect x="282" y="204" width="22" height="162" rx="11" fill="#95fff4" />
    <rect x="320" y="248" width="22" height="118" rx="11" fill="#95fff4" />
    <rect x="358" y="286" width="22" height="80" rx="11" fill="#95fff4" />
  </g>
  <g filter="url(#soft-shadow)">
    <text x="252" y="322" text-anchor="middle" fill="url(#mark)" stroke="#e6fbff" stroke-width="4" paint-order="stroke fill" font-family="Syne, Chakra Petch, Arial Black, sans-serif" font-size="222" font-weight="800" letter-spacing="-20">SS</text>
  </g>
  <g filter="url(#glow)" transform="rotate(-42 171 345)">
    <circle cx="164" cy="326" r="39" fill="none" stroke="url(#lens)" stroke-width="18" />
    <rect x="152" y="360" width="24" height="92" rx="12" fill="url(#lens)" />
  </g>
  <path d="M86 382c42 32 95 49 160 49 74 0 134-24 180-72" fill="none" stroke="#7ffff0" stroke-width="8" stroke-linecap="round" opacity="0.18" />
</svg>
